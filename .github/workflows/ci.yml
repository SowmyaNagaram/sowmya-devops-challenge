name: CI

on:
  push:
  pull_request:

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Lint Python
        run: ruff check app/

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r app/requirements.txt pytest
      - name: Run tests
        run: pytest app/tests/ -v

  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm lint
        run: helm lint helm/skybyte-app
      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar -xz
          sudo mv kubeconform /usr/local/bin/
      - name: Helm template and validate
        run: |
          helm template skybyte-app helm/skybyte-app | \
          kubeconform -strict -kubernetes-version 1.28.0

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform format check
        run: terraform -chdir=terraform fmt -check
      - name: Terraform validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

  docker-build-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: skybyte/app:ci
          load: false
      - name: Build single arch for scanning
        run: docker build -t skybyte/app:ci .
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          exit-code: '1'
          severity: HIGH,CRITICAL
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: skybyte/app:ci
          exit-code: '1'
          severity: HIGH,CRITICAL

  kyverno-policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Install Kyverno CLI
        run: |
          curl -sSL https://github.com/kyverno/kyverno/releases/latest/download/kyverno-cli_latest_linux_x86_64.tar.gz | tar -xz
          sudo mv kyverno /usr/local/bin/
      - name: Render Helm templates
        run: |
          helm template skybyte-app helm/skybyte-app > /tmp/rendered.yaml
      - name: Apply Kyverno policies
        run: |
          kyverno apply policies/ --resource /tmp/rendered.yaml
